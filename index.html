<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BarcodeHub Pro - Professional cloud-based barcode generation and label printing platform for retail, warehouses, and manufacturing." />
    <meta name="keywords" content="barcode generator, label printing, QR code, inventory management, barcode hub" />
    <meta name="author" content="BarcodeHub Pro" />
    <meta property="og:title" content="BarcodeHub Pro" />
    <meta property="og:description" content="Professional barcode generation and label printing platform" />
    <meta property="og:type" content="website" />
    <title>BarcodeHub Pro</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var err = document.createElement('div');
        err.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        err.innerText = 'Runtime Error: ' + e.message + '\n' + (e.error ? e.error.stack : '');
        document.body.appendChild(err);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var err = document.createElement('div');
        err.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        err.innerText = 'Unhandled Promise: ' + e.reason;
        document.body.appendChild(err);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
