services:
  - type: web
    name: barcodehub-api
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barcodehub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      # We allow all origins for the Vercel frontend to connect easily
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"

databases:
  - name: barcodehub-db
    databaseName: barcodehub
    user: barcodehub
