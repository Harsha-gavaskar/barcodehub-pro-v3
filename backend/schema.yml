components:
  schemas:
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        user_email:
          type: string
          readOnly: true
        user_name:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        resource:
          type: string
          readOnly: true
        resource_id:
          type: string
          readOnly: true
        payload:
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - id
      - ip_address
      - payload
      - resource
      - resource_id
      - timestamp
      - user
      - user_agent
      - user_email
      - user_name
    Barcode:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
          nullable: true
        value:
          type: string
          maxLength: 500
        format:
          $ref: '#/components/schemas/FormatB3cEnum'
        svg_data:
          type: string
          readOnly: true
        png_file:
          type: string
          format: uri
          readOnly: true
          nullable: true
        width:
          type: number
          format: double
        height:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        display_value:
          type: boolean
        background_color:
          type: string
          maxLength: 7
        foreground_color:
          type: string
          maxLength: 7
        label:
          type: string
          maxLength: 255
        generated_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - generated_by
      - id
      - png_file
      - svg_data
      - value
    BarcodeFormatEnum:
      enum:
      - CODE128
      - CODE39
      - EAN13
      - EAN8
      - UPC
      - QR
      - DATAMATRIX
      - PDF417
      type: string
      description: |-
        * `CODE128` - CODE 128
        * `CODE39` - CODE 39
        * `EAN13` - EAN-13
        * `EAN8` - EAN-8
        * `UPC` - UPC-A
        * `QR` - QR Code
        * `DATAMATRIX` - Data Matrix
        * `PDF417` - PDF417
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        parent:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        children:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - children
      - created_at
      - id
      - name
    CategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        parent:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
      required:
      - name
    FormatB3cEnum:
      enum:
      - CODE128
      - CODE39
      - EAN13
      - EAN8
      - UPC
      - QR
      - DATAMATRIX
      - PDF417
      type: string
      description: |-
        * `CODE128` - CODE 128
        * `CODE39` - CODE 39
        * `EAN13` - EAN-13
        * `EAN8` - EAN-8
        * `UPC` - UPC-A
        * `QR` - QR Code
        * `DATAMATRIX` - Data Matrix
        * `PDF417` - PDF417
    LabelTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        canvas_json: {}
        thumbnail:
          type: string
          format: uri
          nullable: true
        thumbnail_url:
          type: string
          readOnly: true
        width:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        height:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        background_color:
          type: string
          maxLength: 7
        is_default:
          type: boolean
        is_public:
          type: boolean
        category:
          type: string
          maxLength: 100
        created_by:
          type: string
          format: uuid
          nullable: true
        created_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by_name
      - id
      - name
      - thumbnail_url
      - updated_at
    LabelTemplateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        canvas_json: {}
        thumbnail:
          type: string
          format: binary
          nullable: true
        width:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
